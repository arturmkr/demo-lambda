name: Build and Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BOOTSTRAP_STACK_NAME: image-catalog-bootstrap
  STACK_NAME: image-catalog
  ARTIFACT_KEY: artifacts/app.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.1.0

      - name: Build application
        run: |
          chmod +x scripts/test-local.sh
          ./scripts/test-local.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy bootstrap stack
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"
          aws cloudformation deploy \
            --stack-name "$BOOTSTRAP_STACK_NAME" \
            --template-file infra/01-artifact-bucket.yaml \
            --parameter-overrides ProjectName="$STACK_NAME"
          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$BOOTSTRAP_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ArtifactBucketName'].OutputValue" \
            --output text)
          echo "ARTIFACT_BUCKET=$ARTIFACT_BUCKET" >> "$GITHUB_ENV"

      - name: Upload Lambda artifact
        run: aws s3 cp build/libs/app.jar "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"

      - name: Deploy CloudFormation
        run: |
          trap 'aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --query '\''StackEvents[].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]'\'' \
            --output table' ERR
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file infra/02-image-catalog.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName="$STACK_NAME" \
              ArtifactBucket="$ARTIFACT_BUCKET" \
              ArtifactKey="$ARTIFACT_KEY" \
              LambdaExecutionRoleArn="arn:aws:iam::${ACCOUNT_ID}:role/LabRole"

      - name: Output API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text
